name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.1

      # Substitute the manifest and download URLs in src/module.json with
      # the tag-versioned variants the FoundryVTT package listing expects.
      - name: Substitute Manifest and Download Links For Versioned Ones
        id: sub_release_manifest_version
        uses: microsoft/variable-substitution@v1
        with:
          files: "src/module.json"
        env:
          version: ${{github.event.release.tag_name}}
          url: https://github.com/${{github.repository}}
          manifest: https://github.com/${{github.repository}}/releases/latest/download/module.json
          download: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip

      - name: Install dependencies
        run: npm install

      # Compile the compendium pack JSON sources (under src/packs/_source/)
      # into the LevelDB pack databases (under src/packs/<pack-name>/) that
      # Foundry actually loads. The binary outputs are gitignored — this is
      # the only place they get produced for the published zip.
      - name: Compile compendium packs
        run: npm run build:db

      - name: Build distribution
        run: npm run build

      - run: mkdir package
      - run: mv -v ./dist/* ./package/
      # Zip from inside `package/` so the archive's root contains the module
      # contents directly (Foundry expects `module.json` at the zip root).
      - run: (cd package && zip -r "$OLDPWD/module.zip" .)

      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1.14.0
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./src/module.json, ./module.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}

      # Re-checkout (the previous step may have stashed working-tree edits)
      # before the Discord + Foundry-website publishing steps.
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Github Releases To Discord
        uses: SethCohen/github-releases-to-discord@v1.15.0
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          color: "2105893"
          username: "Release Changelog"
          avatar_url: "https://cdn.discordapp.com/avatars/487431320314576937/bd64361e4ba6313d561d54e78c9e7171.png"
          content: "||<@&1210912175170789396>||"
          footer_title: "Changelog"
          footer_icon_url: "https://cdn.discordapp.com/avatars/487431320314576937/bd64361e4ba6313d561d54e78c9e7171.png"
          footer_timestamp: true

      # Pre-releases (GitHub releases marked prerelease=true) skip the
      # foundryvtt.com publish so a beta doesn't land in the production listing.
      - name: Publish Module to FoundryVTT Website
        if: github.event.release.prerelease == false
        id: publish-to-foundry-website
        uses: cs96and/FoundryVTT-release-package@v1.0.2
        with:
          package-token: ${{ secrets.PACKAGE_TOKEN }}
          manifest-url: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json
          notes-url: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}
