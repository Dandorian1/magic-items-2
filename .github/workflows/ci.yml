name: CI

on:
  push:
    branches: [master, foundry-v13-dnd5e-5-3-compat]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings 0

      - name: Prettier check
        run: npx prettier --check 'src/**/*.{js,mjs,json,scss,css}'

      - name: Compile compendium packs
        run: npm run build:db

      - name: Build distribution
        run: npm run build

      # Bundle parses as valid JS. Catches vite emitting an unparseable bundle.
      - name: Bundle syntax check
        run: node -e "new Function(require('fs').readFileSync('dist/magicitems/module.js','utf8'))"
